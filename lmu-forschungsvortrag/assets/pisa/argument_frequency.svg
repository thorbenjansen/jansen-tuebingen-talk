      <text x="-10" y="52">Trust and respect</text>
      <text x="-10" y="86">Subject mastery</text>
      <text x="-10" y="120">Critical thinking</text>
      <text x="-10" y="154">Teacher as role model</text>
      <text x="-10" y="188">Individual support</text>
      <text x="-10" y="222">Student motivation</text>
      <text x="-10" y="256">Safe learning environment</text>
      <text x="-10" y="290">Interest in the subject</text>
    </g>
    <g>
      <rect x="0" y="6" width="16" height="14" fill="#2f80d0"/><rect x="0" y="21" width="1" height="14" fill="#df5a2e"/>
      <rect x="0" y="40" width="43" height="14" fill="#2f80d0"/><rect x="0" y="55" width="18" height="14" fill="#df5a2e"/>
      <rect x="0" y="74" width="87" height="14" fill="#2f80d0"/><rect x="0" y="89" width="39" height="14" fill="#df5a2e"/>
      <rect x="0" y="108" width="83" height="14" fill="#2f80d0"/><rect x="0" y="123" width="4" height="14" fill="#df5a2e"/>
      <rect x="0" y="142" width="92" height="14" fill="#2f80d0"/><rect x="0" y="157" width="12" height="14" fill="#df5a2e"/>
      <rect x="0" y="176" width="160" height="14" fill="#2f80d0"/><rect x="0" y="191" width="10" height="14" fill="#df5a2e"/>
      <rect x="0" y="210" width="210" height="14" fill="#2f80d0"/><rect x="0" y="225" width="39" height="14" fill="#df5a2e"/>
      <rect x="0" y="244" width="206" height="14" fill="#2f80d0"/><rect x="0" y="259" width="17" height="14" fill="#df5a2e"/>
      <rect x="0" y="278" width="231" height="14" fill="#2f80d0"/><rect x="0" y="293" width="35" height="14" fill="#df5a2e"/>
