<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">How often students used each argument type</title>
  <desc id="desc">Horizontal bars compare detected argument types in texts written with and without generative-AI support.</desc>
  <rect width="760" height="520" fill="#ffffff"/>
  <text x="270" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">How often students used each argument type</text>
  <text x="270" y="65" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#57534">Share of texts where the argument was detected</text>
  <rect x="170" y="92" width="18" height="18" fill="#2f80d0"/><text x="195" y="107" font-family="Inter, Arial, sans-serif" font-size="15">With generative-AI support</text>
  <rect x="410" y="92" width="18" height="18" fill="#df5a2e"/><text x="435" y="107" font-family="Inter, Arial, sans-serif" font-size="15">Without generative-AI support</text>
  <g transform="translate(210 145)" font-family="Inter, Arial, sans-serif" font-size="14">
    <g stroke="#e5e5e5" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="330"/><line x1="150" y1="0" x2="150" y2="330"/><line x1="300" y1="0" x2="300" y2="330"/><line x1="450" y1="0" x2="450" y2="330"/>
    </g>
    <g fill="#777169" text-anchor="end">
